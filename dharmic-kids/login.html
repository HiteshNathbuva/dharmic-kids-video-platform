<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dharmic Kids | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login" class="auth-body">
  <main class="auth-main">
    <section class="auth-card auth-fade-in">
      <h1>Welcome Back 🌈</h1>
      <p>Login to continue your dharmic story adventure.</p>

      <form id="loginForm" class="auth-form" novalidate>
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" placeholder="Enter your password" required />

        <button type="submit" class="auth-btn">Login</button>
      </form>

      <p id="authMessage" class="auth-message" role="status" aria-live="polite"></p>
      <p class="auth-link-row">Don't have an account? <a href="signup.html">Sign up</a></p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
